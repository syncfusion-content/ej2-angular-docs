<!DOCTYPE html>
<html lang="en">

<head>
    <title>Syncfusion Angular Schedule</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Typescript UI Controls" />
    
<meta name="author" content="Syncfusion" />
    <style>
        #loader {
            color: #008cff;
            font-family: 'Helvetica Neue', 'calibiri';
            font-size: 16px;
            height: 40px;
            left: 45%;
            position: absolute;
            top: 45%;
            width: 30%;
        }

        #verify {
            position: fixed;
            padding: 0 20px;
        }

        #text {
            cursor: pointer;
            display: inline-block;
            font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
            font-size: 14px;
            font-weight: normal;
            line-height: 14px;
            user-select: none;
            margin-left: 8px;
            vertical-align: middle;
            white-space: normal;
        }

        #right-button {
            padding: 0 10px;
        }
    </style>
</head>

<body style="margin-top: 125px">
    <app-root>
        <div id='loader'>LOADING....</div>
    </app-root>
</body>

</html>
