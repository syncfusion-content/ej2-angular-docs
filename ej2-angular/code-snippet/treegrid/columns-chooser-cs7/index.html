<!DOCTYPE html>
<html lang="en">

<head>
    <title>Syncfusion Angular Grid</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Typescript UI Controls" />

    <meta name="author" content="Syncfusion" />
    <style>
        #loader {
            color: #008cff;
            font-family: 'Helvetica Neue', 'calibiri';
            font-size: 16px;
            height: 40px;
            left: 45%;
            position: absolute;
            top: 45%;
            width: 30%;
        }
        #stackedHeadertreegrid .no-record-text {
            padding: 5px;
        }

        #stackedHeadertreegrid .e-dlg-header {
            width: 300px !important;
        }

        #TreeGrid_gridcontrol_ccdlg .e-columnChooserTemplate {
            overflow-x: auto !important;
            overflow-y: auto;
            min-width: 230px;
        }

        #TreeGrid_gridcontrol_ccdlg .e-columnChooserTemplate .e-ul {
            width: fit-content !important;
        }

        #TreeGrid_gridcontrol_ccdlg .e-treeview .e-text-content,
        #TreeGrid_gridcontrol_ccdlg .e-treeview .e-list-text {
            white-space: nowrap !important;
            overflow: hidden;
        }

        .no-border {
            border: none !important;
        }
    </style>
</head>

<body style="margin-top: 125px">
    <app-container>
        <div id='loader'>Loading....</div>
    </app-container>
</body>

</html>
