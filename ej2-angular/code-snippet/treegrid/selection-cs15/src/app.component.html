<ejs-treegrid #Treegrid [dataSource]='data' [treeColumnIndex]='1' [enableVirtualization]=true height='400'  childMapping= 'items' autoCheckHierarchy="true" (checkboxChange)="updateFooterTotal()" (dataBound)="updateFooterTotal()" >
                    <e-columns>
                       <e-column field='id' isPrimaryKey="true" [visible]="false"></e-column>
                        <e-column field='name'  headerText='Item'  width=180 showCheckbox="true"></e-column>
                        <e-column field='description'  headerText='Description'  width=200></e-column>
                        <e-column field='quantity' headerText='Quantity', width=100 textAlign="Right"></e-column>
                        <e-column field='price' headerText='Price' width=200 textAlign="Right"></e-column>
                        <e-column field='status' headerText='Status' width=100></e-column>
                        <e-column field='popularity' headerText='Popularity' width=110></e-column>
                    </e-columns>
        <e-aggregates >
        <e-aggregate [showChildSummary]='false' >
            <e-columns>
                <e-column field="price" type="Custom">
                    <ng-template #footerTemplate let-data><span class="selected-total">Total Price of Selected Rows: $0.00</span></ng-template>
                </e-column>
            </e-columns>
        </e-aggregate>
    </e-aggregates>                    
</ejs-treegrid>
