<!DOCTYPE html>
<html lang="en">
<head>
    <title>Syncfusion Angular PDF Viewer</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Typescript UI Controls" />
    
<meta name="author" content="Syncfusion" />
    <style>
    #loader {
        color: #008cff;
        font-family:  'Helvetica Neue','calibiri';
        font-size: 16px;
        height: 40px;
        left: 45%;
        position: absolute;
        top: 45%;
        width: 30%;
    }
</style>
</head>
<body>
    <app-container>
        <div class="col-lg-9 control-section">
            <div class="content-wrapper">
                <ejs-pdfviewer #pdfviewer id="pdfViewer" [documentPath]='document' [resourceUrl]='resource'
                    (documentLoad)='documentLoaded($event)'
                    (customContextMenuBeforeOpen)='customContextMenuBeforeOpen($event)'
                    (customContextMenuSelect)='customContextMenuSelect($event)'
                    style="height:640px;display:block"></ejs-pdfviewer>
            </div>
        </div>
        <div class="col-lg-3 property-section">
            <div class="header-pdfviewer">Properties</div>
            <table id="property" title="Properties" class="left-side-property-pdfviewer">
                <tr>
                    <td class="left-side-pdfviewer">Hide Default Context Menu</td>
                    <td><ejs-checkbox id="hide" #hide [checked]="false"
                            (change)="contextmenuHelper($event)"></ejs-checkbox></td>
                </tr>
                <tr>
                    <td class="left-side-pdfviewer">Add Custom option at bottom</td>
                    <td><ejs-checkbox id="toolbar" #toolbar [checked]="false"
                            (change)="contextmenuHelper($event)"></ejs-checkbox></td>
                </tr>
            </table>
        </div>
    </app-container>
</body>
</html>
