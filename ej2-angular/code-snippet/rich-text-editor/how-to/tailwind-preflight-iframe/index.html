<!DOCTYPE html>
<html lang="en">

<head>
    <title>Syncfusion Angular Rich Text Editor</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Typescript UI Controls" />

    <meta name="author" content="Syncfusion" />
    <style>
        #loader {
            color: #008cff;
            font-family: 'Helvetica Neue', 'calibiri';
            font-size: 16px;
            height: 40px;
            left: 45%;
            position: absolute;
            top: 45%;
            width: 30%;
        }

        body.e-content li {
            margin-bottom: 10px !important;
            padding: unset !important;
        }

        body.e-content ul {
            list-style-type: disc !important;
            padding: unset !important;
            margin-left: 40px;
        }

        body.e-content ol {
            list-style-type: decimal !important;
            padding: unset !important;
            margin-left: 40px;
        }

        body.e-content ul[style*="list-style-type: circle"] {
            list-style-type: circle !important;
            padding: unset !important;
            margin-left: 40px;
        }

        body.e-content ul[style*="list-style-type: square"] {
            list-style-type: square !important;
            padding: unset !important;
            margin-left: 40px;
        }

        body.e-content ol[style*="list-style-type: lower-greek"] {
            list-style-type: lower-greek !important;
            padding: unset !important;
            margin-left: 40px;
        }

        body.e-content ol[style*="list-style-type: upper-alpha"] {
            list-style-type: upper-alpha !important;
            padding: unset !important;
            margin-left: 40px;
        }

        body.e-content ol[style*="list-style-type: lower-alpha"] {
            list-style-type: lower-alpha !important;
            padding: unset !important;
            margin-left: 40px;
        }

        body.e-content ol[style*="list-style-type: upper-roman"] {
            list-style-type: upper-roman !important;
            padding: unset !important;
            margin-left: 40px;
        }

        body.e-content ol[style*="list-style-type: lower-roman"] {
            list-style-type: lower-roman !important;
            padding: unset !important;
            margin-left: 40px;
        }
    </style>
</head>

<body style="margin-top: 125px">
    <app-root>
        <div id='loader'>Loading....</div>
    </app-root>
</body>

</html>
