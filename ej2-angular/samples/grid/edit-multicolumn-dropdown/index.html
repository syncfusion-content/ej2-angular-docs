    <link href="https://cdn.syncfusion.com/ej2/32.1.19/material3.css" rel="stylesheet">

    <style>
        #loader {
            color: #008cff;
            font-family: 'Helvetica Neue', 'calibiri';
            font-size: 16px;
            height: 40px;
            left: 45%;
            position: absolute;
            top: 45%;
            width: 30%;
        }

        .content {
            margin: 0 auto;
            width: 550px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            table-layout: fixed;
        }

        th,
        td {
            border-width: 1px 0 0 1px;
            border-color: #e0e0e0;
            text-align: left;
            border-style: solid;
            display: table-cell;
        }

        th {
            line-height: 36px;
            text-indent: 16px;
        }

        .e-ddl-header {
            padding-right: 17px;
            border-width: 1px 0px 1px 0px;
            border-color: #e0e0e0;
            border-style: solid;
        }

        .e-dropdownbase .e-list-item {
            padding-right: 0px;
        }
    </style>
