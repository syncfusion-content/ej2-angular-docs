<head>
    <title>EJ2 Angular Speech To Text</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Angular Speech To Text Component">

    <style>#loader{color:#008cff;height:40px;left:45%;position:absolute;top:45%;width:30%}</style><link href="index.css" rel="stylesheet" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="index.css"></noscript>
    <style>
        .waveform-container {
            margin-top: 20px;
            font-weight: bold;
        }
    
        .waveform {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 40px;
        gap: 5px;
        }
    
        .waveform span {
        display: block;
        width: 6px;
        height: 20px;
        background: #28a745;
        animation: wave-animation 1.2s infinite ease-in-out;
        }
    
        .waveform span:nth-child(1) {
            animation-delay: 0s;
        }
    
        .waveform span:nth-child(2) {
            animation-delay: 0.2s;
        }
    
        .waveform span:nth-child(3) {
            animation-delay: 0.4s;
        }
    
        .waveform span:nth-child(4) {
            animation-delay: 0.6s;
        }
    
        .waveform span:nth-child(5) {
            animation-delay: 0.8s;
        }
    
        @keyframes wave-animation {
            0%, 100% {
                height: 10px;
            }
    
            50% {
                height: 30px;
            }
        }
    
        #container {
            text-align: center;
            margin: 50px auto;
            max-width: 400px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            background: #fff;
        }
    
        .status-box {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 40px;
            font-weight: bold;
        }
    
        .status-box.listening {
            background-color: #d1e7dd;
            color: #0f5132;
        }
    
        .status-box.stopped {
            background-color: #f8d7da;
            color: #842029;
        }
    
        .status-box.inactive {
            background-color: #e2e3e5;
            color: #6c757d;
        }
    
        .visual-indicator {
            margin-top: 20px;
        }
    </style>
