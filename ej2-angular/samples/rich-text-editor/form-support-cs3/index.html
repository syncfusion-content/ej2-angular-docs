<head>
    <title>Syncfusion Angular Rich Text Editor</title>
    <meta charset="utf-8">

    <style>
    #loader {
        color: #008cff;
        font-family:  'Helvetica Neue','calibiri';
        font-size: 16px;
        height: 40px;
        left: 45%;
        position: absolute;
        top: 45%;
        width: 30%;
    }
    .checkbox-wrapper {
        display: flex;
        align-items: center;
        padding: 10px;
      }

      .checkbox-wrapper input[type='checkbox'] {
        width: 15px;
        height: 15px;
        margin: 0px 10px 0px 0;
        cursor: pointer;
      }

      .checkbox-wrapper input[type='checkbox']:checked {
        background-color: #0078d4;
        border-color: #0078d4;
      }

      .checkbox-wrapper label {
        font-size: 16px;
        color: #333;
        cursor: pointer;
        display: contents;
      }
</style>
