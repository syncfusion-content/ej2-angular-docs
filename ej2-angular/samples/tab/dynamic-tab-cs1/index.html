<!DOCTYPE html>
<html lang="en" data-critters-container>
<head>
    <title>Angular Tab</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Angular Tab Control">
    
<link href="https://cdn.syncfusion.com/ej2/24.1.41/material.css" rel="stylesheet">
<meta name="author" content="Syncfusion">
    <style>#loader{color:#008cff;height:40px;left:45%;position:absolute;top:45%;width:30%}#form-container{margin:0 auto;max-width:300px}.btn-section{text-align:center}.info{font-weight:bold}</style><link href="index.css" rel="stylesheet" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="index.css"></noscript>
<style>@import"https://fonts.googleapis.com/css?family=Roboto:400,500,700";.e-btn{-webkit-font-smoothing:antialiased;border:1px solid;border-radius:2px;box-sizing:border-box;cursor:pointer;display:inline-block;font-family:Roboto,Segoe UI,GeezaPro,"DejaVu Serif","sans-serif",-apple-system,BlinkMacSystemFont;font-size:14px;font-weight:500;justify-content:center;line-height:1.143em;outline:none;padding:6px 12px 4px;text-align:center;text-decoration:none;text-transform:uppercase;-webkit-user-select:none;user-select:none;vertical-align:middle;white-space:nowrap}.e-btn:disabled{cursor:default}.e-btn:hover,.e-btn:focus{text-decoration:none}.e-btn::-moz-focus-inner{border:0;padding:0}.e-btn{-webkit-tap-highlight-color:transparent;background:#fafafa;border-color:transparent;box-shadow:0 3px 1px -2px #0003,0 2px 2px #00000024,0 1px 5px #0000001f;color:#000000de;transition:box-shadow .28s cubic-bezier(.4,0,.2,1)}.e-btn:hover{background:#e2e2e2fb;border-color:transparent;box-shadow:0 2px 4px -1px #0003,0 4px 5px #00000024,0 1px 10px #0000001f;color:#000000de}.e-btn:focus{background:#0000002e;border-color:transparent;color:#000000de;outline:#fafafa 0 solid;outline-offset:0;box-shadow:0 2px 4px -1px #0003,0 4px 5px #00000024,0 1px 10px #0000001f}.e-btn:active{background:#b8b8b8f4;border-color:transparent;color:#000000de;outline:#fafafa 0 solid;outline-offset:0}.e-btn:disabled{background:#0000001f;border-color:transparent;box-shadow:none;color:#00000042}.e-float-input{border-radius:0}.e-float-input{line-height:1.4;margin-bottom:4px;margin-top:16px;padding-top:0;position:relative;width:100%}.e-float-input{font-family:Roboto,Segoe UI,GeezaPro,"DejaVu Serif","sans-serif",-apple-system,BlinkMacSystemFont;font-size:13px;font-weight:400}.e-float-input{background:transparent;color:#000000de}</style><link rel="stylesheet" href="styles.dd27266cd9b5545e.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="styles.dd27266cd9b5545e.css"></noscript></head>
<body>
    <div id="wrapper" style="margin-top: 20px;">
        <div id="tab1_content" style="display: none">
            <ul>
                <li>Click on the "+" header to add dynamic tab items. </li>
                <li>It displays input elements to get the new tab information. </li>
                <li>Add details and click the "Add Tab" button to open the newly added tab.</li>
            </ul>
        </div>
        <div id="form-container" style="display: none">
            <div class="e-float-input">
                <input type="text" id="tab-title" required>
                <span class="e-float-line"></span>
                <label class="e-float-text">Enter header title</label>
            </div>
            <br>
            <div class="e-float-input">
                <textarea rows="5" type="text" id="tab-content" required></textarea>
                <span class="e-float-line"></span>
                <label class="e-float-text">Enter content</label>
            </div>
            <br>
            <div class="btn-section">
                <button id="btn-add" class="e-btn">Add Tab</button>
                <br>
                <br>
                <span class="info"> * Title is mandatory to add a new Tab</span>
            </div>
        </div>
        <app-container>
            <div id="loader">LOADING....</div>
        </app-container>
    </div>
<script src="runtime.cf3bdadb8fd8abdc.js" type="module"></script><script src="main.3e9ee76c6f8af25c.js" type="module"></script></body>
</html>
